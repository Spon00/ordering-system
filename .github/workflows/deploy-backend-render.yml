name: Deploy Backend to Render

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  trigger-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "${RENDER_API_KEY}" ] || [ -z "${RENDER_SERVICE_ID}" ]; then
            echo "Missing Render secrets. Add RENDER_API_KEY and RENDER_SERVICE_ID to repo secrets.";
            exit 1;
          fi
          echo "Triggering Render deploy for service: ${RENDER_SERVICE_ID}"
          curl -s -X POST \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            "https://api.render.com/deploy/srv-${RENDER_SERVICE_ID}/deploys" \
            -d '{}' | jq '.' || true
